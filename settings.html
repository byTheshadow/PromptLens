<div id="pl-settings-container">

  <div class="pl-settings-title">
    <span>●</span> PromptLens 掠影
    <span class="pl-version-badge">v0.1.0</span>
  </div>

  <!-- 快捷入口 -->
  <div class="pl-settings-section">
    <div class="pl-settings-label">快捷操作</div>
    <div class="pl-settings-row">
      <button class="pl-btn pl-btn-primary" id="pl-settings-open-panel">
        📓 打开主面板
      </button>
    </div>
  </div>

  <!-- 数据统计 -->
  <div class="pl-settings-section">
    <div class="pl-settings-label">数据概览</div>
    <div class="pl-card">
      <div class="pl-stat-row">
        <span>笔记总数</span>
        <span class="pl-stat-val" id="pl-stat-notes">0</span>
      </div>
      <div class="pl-stat-row">
        <span>快照总数</span>
        <span class="pl-stat-val" id="pl-stat-snapshots">0</span>
      </div>
      <div class="pl-stat-row">
        <span>存储占用</span>
        <span class="pl-stat-val" id="pl-stat-storage">0 KB</span>
      </div>
    </div>
  </div>

  <!-- 数据管理（P1 预留，按钮先占位） -->
  <div class="pl-settings-section">
    <div class="pl-settings-label">数据管理</div>
    <div class="pl-settings-row">
      <button class="pl-btn pl-btn-ghost" id="pl-settings-export" disabled>
        ⬇ 导出备份
      </button>
      <button class="pl-btn pl-btn-ghost" id="pl-settings-import" disabled>
        ⬆ 导入数据
      </button>
    </div>
    <div style="font-size: 11px; color: #555; margin-top: 6px;">
      导出 / 导入功能将在 P1 版本启用
    </div>
  </div>

  <!-- 关于 -->
  <div class="pl-settings-section">
    <div class="pl-settings-label">关于</div>
    <div class="pl-card" style="font-size: 12px; color: #666; line-height: 1.7;">
      PromptLens 掠影<br>
      预设工程师的读书笔记插件<br>
      by Shadow
    </div>
  </div>

</div>
