<div id="promptlens-settings-wrap" class="promptlens-settings"><!--★ 可折叠头部：点击折叠/展开 -->
  <div class="promptlens-settings-header promptlens-collapsible-toggle" id="promptlens-collapse-toggle">
    <div class="promptlens-settings-title">
      <span class="promptlens-settings-icon">📓</span>
      <span class="promptlens-settings-name">PromptLens ·掠影</span>
      <span class="promptlens-settings-version">v1.0.0</span><span class="promptlens-collapse-arrow" id="promptlens-collapse-arrow">▼</span>
    </div>
    <div class="promptlens-settings-subtitle">by Shadow — 预设工程师的读书笔记插件</div>
  </div>

  <!-- ★ 可折叠内容区-->
  <div class="promptlens-settings-body" id="promptlens-settings-body">

    <!-- 启用开关 -->
    <div class="promptlens-settings-row">
      <label class="promptlens-settings-label" for="promptlens-toggle">启用插件</label>
      <label class="promptlens-toggle-switch">
        <input type="checkbox" id="promptlens-toggle" checked />
        <span class="promptlens-toggle-slider"></span>
      </label>
    </div>

    <!-- ★ 悬浮球开关（独立于插件启用） -->
    <div class="promptlens-settings-row">
      <label class="promptlens-settings-label" for="promptlens-fab-toggle">显示悬浮球</label>
      <label class="promptlens-toggle-switch">
        <input type="checkbox" id="promptlens-fab-toggle" checked />
        <span class="promptlens-toggle-slider"></span>
      </label>
    </div>

    <!--打开面板按钮 -->
    <div class="promptlens-settings-row">
      <button id="promptlens-open-panel" class="promptlens-btn-primary" title="打开掠影悬浮面板">
        <span>🔴</span> 打开掠影面板
      </button>
    </div>

    <div class="promptlens-settings-divider"></div>

    <!-- 运行日志 -->
    <div class="promptlens-settings-section">
      <div class="promptlens-settings-section-title">运行日志</div>
      <div id="promptlens-log-container" class="promptlens-log-container">
        <div class="promptlens-log-empty">暂无日志</div>
      </div>
      <div class="promptlens-log-actions">
        <button id="promptlens-log-clear" class="promptlens-btn-sm" title="清空日志">清空日志</button>
        <button id="promptlens-log-copy" class="promptlens-btn-sm" title="复制全部日志">复制日志</button>
      </div>
    </div>

    <div class="promptlens-settings-divider"></div>

    <!-- 数据管理 -->
    <div class="promptlens-settings-section">
      <div class="promptlens-settings-section-title">数据管理</div>
      <div class="promptlens-data-stats">
        <span id="promptlens-stat-notes">笔记:<strong>0</strong>条</span>
        <span class="promptlens-stat-sep">·</span>
        <span id="promptlens-stat-snapshots">快照: <strong>0</strong> 条</span>
      </div>
      <div class="promptlens-data-actions">
        <button id="promptlens-export" class="promptlens-btn-sm">导出数据</button>
        <button id="promptlens-import" class="promptlens-btn-sm">导入数据</button>
        <button id="promptlens-clear-all" class="promptlens-btn-sm promptlens-btn-danger">⚠ 清空所有数据</button>
        <input type="file" id="promptlens-import-file" accept=".json" style="display:none;" />
      </div>
    </div>

  </div><!-- ★ 可折叠内容区结束 -->

</div>
